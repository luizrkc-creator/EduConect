<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Aluno</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<section class="login-container">

    <h1>Cadastro do Aluno</h1>

    <input id="nomeAluno" type="text" placeholder="Nome completo">

    <input id="emailAluno" type="email" placeholder="Seu email">

    <input id="cidadeAluno" type="text" placeholder="Cidade">

    <input id="senhaAluno" type="password" placeholder="Crie uma senha">

<select id="disciplinaAluno">

        <option>Escolha a disciplina</option>

        <option>Matemática</option>

        <option>Português</option>

        <option>Biologia</option>

        <option>História</option>

        <option>Física</option>

        <option>Química</option>

    </select>

    <button onclick="cadastrarAluno()">Cadastrar</button>

    <br><br>

    <a href="../index.html">Voltar</a>

</section>
<script src="../js/app.js"></script>
</body>
</html>
